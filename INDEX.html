
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#080810">
<title>The House Always Wins 🏠</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;The House Always Wins&quot;,&quot;short_name&quot;:&quot;House&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#080810&quot;,&quot;theme_color&quot;:&quot;#FFD700&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;}]}">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--bg2:#111120;--bg3:#1a1a30;--gold:#FFD700;--gold2:#FFA500;--green:#00C896;--red:#FF4560;--pink:#FF69B4;--blue:#4FC3F7;--text:#E8E8F0;--muted:#666680;--border:#2a2a45;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:'Heebo',sans-serif;color:var(--text);direction:rtl;overflow:hidden}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:inherit;font-size:13px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--bg2)}
button{cursor:pointer;font-family:inherit;transition:all .15s}
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 600px; margin: 0 auto; }.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;  
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  padding-bottom: 75px; 
}

.content::-webkit-scrollbar {
  width: 3px;
}
.content::-webkit-scrollbar-thumb {
  background: var(--gold);
  border-radius: 2px;
}

.nav {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 6px 0;
  
  /* Pins the navigation strictly to the bottom of the device viewport */
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 600px;
  z-index: 100;
  
  
  padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px)); 
}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px}
.gold-b{border-color:var(--gold)!important}.green-b{border-color:var(--green)!important}.pink-b{border-color:var(--pink)!important}.red-b{border-color:var(--red)!important}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;padding:8px 16px;border-radius:9px;font-weight:700;font-size:13px}
.btn-gold:active{filter:brightness(.9)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:9px;font-size:13px}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:5px 10px!important;font-size:11px!important;border-radius:7px!important}
.btn-red{background:var(--red);color:#fff;border:none;padding:7px 13px;border-radius:9px;font-size:12px}
.gold{color:var(--gold)}.green{color:var(--green)}.red{color:var(--red)}.muted{color:var(--muted)}
.gs{background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold),var(--gold2));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 2s linear infinite}
@keyframes shimmer{to{background-position:-200% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes popIn{0%{transform:scale(.7);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes lvlUp{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.fade-in{animation:fadeUp .3s ease}
.hf{animation:float 3s ease-in-out infinite;display:inline-block}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px;animation:fadeUp .2s ease}
.modal{background:var(--bg2);border:1px solid var(--gold);border-radius:16px;padding:18px;width:100%;max-width:370px;max-height:90vh;overflow-y:auto}
.xp-bar{background:var(--bg);border-radius:3px;height:4px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width .5s}
.pb{background:var(--bg);border-radius:5px;height:9px;overflow:hidden}
.pf{height:100%;border-radius:5px;transition:width .5s}
.row{display:flex;justify-content:space-between;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.st{color:var(--gold);font-size:11px;font-weight:700;margin-bottom:9px}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:11px;font-size:12px;font-weight:600;z-index:500;white-space:nowrap;pointer-events:none;animation:popIn .3s ease}
.tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600}
.sw{transition:transform 2s cubic-bezier(.17,.67,.12,.99)}
.wp{position:relative;width:155px;height:155px;margin:0 auto 10px}
.wptr{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:17px;line-height:1}
.tc{position:fixed;inset:0;pointer-events:none;z-index:600;overflow:hidden}
/* Level Up Overlay */
.lvl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeUp .3s ease}
.lvl-badge{font-size:80px;animation:lvlUp .6s ease forwards;margin-bottom:16px}
.lvl-text{font-size:28px;font-weight:900;text-align:center;animation:lvlUp .6s .1s ease both}
/* Badge grid */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.badge-item{background:var(--bg3);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)}
.badge-item.earned{border-color:var(--gold);background:#1a1a00}
.badge-item.locked{opacity:.35}
/* Chart SVG */
.chart-wrap{overflow-x:auto;padding-bottom:4px}
/* Activity feed */
.feed-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
.feed-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* Annual table */
.ann-table{width:100%;border-collapse:collapse;font-size:10px}
.ann-table th{background:var(--bg3);color:var(--gold);padding:5px 6px;text-align:right;font-weight:700;position:sticky;top:0}
.ann-table td{padding:4px 6px;border-bottom:1px solid var(--border);text-align:right}
.ann-table tr:hover td{background:var(--bg3)}
.ann-table .cat-hdr td{background:var(--bg3);color:var(--gold);font-weight:700;font-size:9px}
/* PWA install */
.install-bar{background:linear-gradient(135deg,#1a1a00,#2a2a00);border:1px solid var(--gold);border-radius:10px;padding:10px 13px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span style="font-size:10px;color:var(--muted);letter-spacing:2px">🏠 THE HOUSE ALWAYS WINS</span>
    <button onclick="openPicker()" style="background:var(--bg3);border:1px solid var(--gold);border-radius:9px;padding:5px 10px;color:var(--gold);font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px">
      <span id="tb-av">👤</span><span id="tb-nm">טוען...</span><span style="font-size:9px;color:var(--muted)">▼</span>
    </button>
  </div>
  <div class="content" id="content"></div>
  <nav class="nav" id="nav"></nav>
</div>

<div class="toast" id="toast" style="display:none"></div>
<div class="tc" id="tc"></div>
<div id="lvl-overlay" style="display:none"></div>

<!-- Modals -->
<div class="modal-ov" id="pm" style="display:none" onclick="if(event.target===this)closePicker()">
  <div class="modal"><h3 class="gold" style="text-align:center;margin-bottom:13px;font-size:16px">👤 מי אתה?</h3><div id="plist"></div></div>
</div>
<div class="modal-ov" id="tm" style="display:none" onclick="if(event.target===this)closeTM()">
  <div class="modal"><h3 class="gold" style="text-align:center;margin-bottom:13px;font-size:15px">✅ מי ביצע?</h3><div id="tlist"></div><button class="btn-ghost btn-sm" style="width:100%;margin-top:7px" onclick="closeTM()">ביטול</button></div>
</div>
<div class="modal-ov" id="em" style="display:none" onclick="if(event.target===this)closeEM()">
  <div class="modal"><h3 class="gold" style="margin-bottom:11px;font-size:14px">✏️ ערוך שחקן</h3>
    <input id="en" placeholder="שם" style="margin-bottom:9px">
    <div id="eavs" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px"></div>
    <div style="display:flex;gap:7px"><button class="btn-gold" style="flex:1" onclick="saveEP()">שמור</button><button class="btn-ghost" onclick="closeEM()">ביטול</button></div>
  </div>
</div>
<div class="modal-ov" id="qrm" style="display:none" onclick="if(event.target===this)document.getElementById('qrm').style.display='none'">
  <div class="modal" style="text-align:center">
    <h3 class="gold" style="margin-bottom:13px">📤 שתף / ייבא נתונים</h3>
    <div id="qr-canvas" style="margin:0 auto 14px"></div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:13px">סרוק עם הטלפון השני לייבוא הנתונים</p>
    <button class="btn-gold" style="width:100%;margin-bottom:8px" onclick="importFromClipboard()">📋 ייבא מלוח</button>
    <button class="btn-ghost" style="width:100%" onclick="document.getElementById('qrm').style.display='none'">סגור</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const KEY='haw_v5';
const AVS=['👨','👩','🧑','👦','👧','🧔','👱','🧕','🎅','🦸','🧙','👻','🐱','🦊','🐺','🦁','🐸','🤖','👾','🎭','🧒','👼','🦄','🌟'];
const LVLS=['דילר מתחיל','שחקן קלפים','הייי רולר','בוס הקזינו','הבית מנצח'];
const WHL=['לבשל ביחד 🍳','ערב סרטים 🎬','פיקניק 🌿','מסעדה 🍣','משחקים 🎲','טיול 🌄','ריקוד בבית 💃','כוכבים ✨'];
const MNS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const DNS=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const SC=['כללי','פירות וירקות','מוצרי חלב','בשר ודגים','ניקיון','טיפוח','פחמימות','שימורים','משקאות'];

// Smart category keywords
const SMART_CATS={
  'פירות וירקות':['תפוח','בננה','עגבניה','מלפפון','גזר','תפוז','ענבים','תות','אבוקדו','חסה','פלפל','בצל','שום','תפוח אדמה','ירק','פרי'],
  'מוצרי חלב':['חלב','גבינה','יוגורט','שמנת','חמאה','קוטג','לבן','ביצ'],
  'בשר ודגים':['עוף','בשר','דג','סלמון','טונה','כבש','המבורגר','נקניק','שניצל'],
  'ניקיון':['סבון','שמפו','אבקת כביסה','נוזל','ממיס','מנקה','נייר טואלט','מגבת','אשפה'],
  'טיפוח':['קרם','דאודורנט','מברשת','משחת שיניים','ניחוח','פנים'],
  'פחמימות':['לחם','פיתה','אורז','פסטה','קמח','דגני'],
  'שימורים':['שימורי','קופסה','רוטב','קטשופ','חמוצים'],
  'משקאות':['מים','מיץ','קולה','בירה','יין','קפה','תה','שתי'],
};

const BADGES=[
  {id:'chef',icon:'👨‍🍳',name:'שף השבוע',desc:'בשל 5 ארוחות',check:s=>s.din&&Object.values(s.din.plans).filter(p=>p.done).length>=5},
  {id:'budget_king',icon:'👑',name:'מלך התקציב',desc:'חסוך ב-3 קטגוריות',check:s=>s.budget&&s.budget.entries.filter(e=>e.type==='inc'||e.saved).length>=3},
  {id:'date_champ',icon:'💑',name:'אלופי הדייטים',desc:'5 דייטים רשומים',check:s=>s.rom&&s.rom.dates.length>=5},
  {id:'task_hero',icon:'🦸',name:'גיבור המשימות',desc:'50 משימות הושלמו',check:s=>s.tasks&&s.tasks.comp.length>=50},
  {id:'saver',icon:'💎',name:'החוסך הגדול',desc:'3 חודשים מתחת לתקציב',check:s=>false},
  {id:'streak7',icon:'🔥',name:'רצף שבועי',desc:'7 ימים רצופים עם משימות',check:s=>false},
  {id:'shopper',icon:'🛒',name:'קניין המשפחה',desc:'סיים 10 קניות',check:s=>s.shop&&(s.shop.trips||0)>=10},
  {id:'romantic',icon:'💕',name:'רומנטיקן',desc:'דייט בכל חודש במשך 3 חודשים',check:s=>false},
  {id:'planner',icon:'📅',name:'המתכנן',desc:'20 אירועים ביומן',check:s=>s.cal&&s.cal.events.length>=20},
];

const CEX={
  'מזון ופארמה':['קניות ר.ל./ אושר עד','קניות מכולת','פארמה וטואלטיקה','אוכל מוכן','מזון - כללי'],
  'פנאי ובילוי':['מסעדה ואוכל בחוץ','מוזאון','חופשות','בילויים ומופעים','חוגים','בייביסיטר','פנאי - כללי'],
  'ביגוד והנעלה':['ביגוד הורים','ביגוד ילדים','נעליים','ביגוד - כללי'],
  'תכולת בית':['ריהוט','מוצרי חשמל','משחקים וספרים','כלי בית','תכולת בית - כללי'],
  'אחזקת בית':['חשמל','מים וביוב','גז','ניקיון','תיקונים','גינה','אחזקת בית - כללי'],
  'טיפוח':["מספרה","קוסמטיקה","לק ג'ל","טיפוח - כללי"],
  'חינוך':['בית ספר','מסגרות צהריים','מסגרות יום','צהרון / מטפלת','הסעות','שיעור פרטי','מסגרות קיץ','חוגים ותנועת נוער','חינוך - כללי'],
  'בריאות':['קופ"ח','ביטוח רפואי נוסף','טיפולים פרטיים','תרופות','שיניים','אופטיקה','בריאות - כללי'],
  'תחבורה':['דלק','חניה','כבישי אגרה','ביטוח רכב','תחזוקת רכב','תחבורה ציבורית','רישוי','פנגו','תחבורה - כללי'],
  'דיור':['משכנתה','ועד בית','ארנונה','ביטוח נכס','דיור - כללי'],
  'תקשורת':['טלפון נייד','טלויזיה ואינטרנט','שירותי תוכן','תקשורת - כללי'],
  'פיננסים':['עמלות','ביטוח חיים','ביטוח לאומי','פיננסים - כללי'],
  'נכסים':['קופת גמל','Charles Schwab','BOA','קופת גולדן פיק'],
  'משפחה':['שמחות משפחה','דמי כיס','עזרה למשפחה','מזונות','משפחה - כללי'],
  'אירועים ותרומות':['חגים וצרכי דת','אירוע בעבודה','תרומות - ישיבת חורש ירון','תרומות מקימי','תרומות יחד'],
  'התחייבויות':['החזר חובות חודשי','ריביות משיכת יתר'],
};
const CIN={'שכר':['שכר גולדן פיק','שכר משרד החינוך','שכר מנעולנות','שכר - כללי'],'קצבאות':['קצבת ילדים','קצבת נכות','קצבת אבטלה','קצבת לידה','מילואים'],'הכנסות שונות':['הכנסות שונות - כללי','ביט/ פייבוקס','ריבית זכות']};
const DTASKS=[{id:1,name:'לטאטא / לנגב',icon:'🧹',freq:'שבועי',assigned:''},{id:2,name:'כביסה',icon:'👕',freq:'שבועי',assigned:''},{id:3,name:'כלים',icon:'🍽️',freq:'יומי',assigned:''},{id:4,name:'לסדר / לאסוף',icon:'🧺',freq:'יומי',assigned:''},{id:5,name:'להוציא אשפה',icon:'🗑️',freq:'שבועי',assigned:''}];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let S,pg='home',sa=0,spinning=false,eAv=null,ePid=null,tPid=null,bTab='log',bM=new Date().getMonth(),bY=new Date().getFullYear(),bCol={},dWk=0,deferredInstall=null;

function ld(){
  try{const r=localStorage.getItem(KEY);if(r)S=JSON.parse(r);}catch{}
  if(!S)S={
    players:[
      {id:1,name:'הורה 1',avatar:'👨',role:'parent',pts:0,xp:0,lvl:1,badges:[]},
      {id:2,name:'הורה 2',avatar:'👩',role:'parent',pts:0,xp:0,lvl:1,badges:[]},
      {id:3,name:'ילד 1',avatar:'👦',role:'child',pts:0,xp:0,lvl:1,badges:[]},
      {id:4,name:'ילד 2',avatar:'👧',role:'child',pts:0,xp:0,lvl:1,badges:[]},
      {id:5,name:'ילד 3',avatar:'🧒',role:'child',pts:0,xp:0,lvl:1,badges:[]},
      {id:6,name:'ילד 4',avatar:'👼',role:'child',pts:0,xp:0,lvl:1,badges:[]},
    ],
    aId:1,
    budget:{entries:[],targets:{},recurring:[]},
    cal:{events:[],gcTok:null,gcEvs:[],anniversary:null},
    rom:{dates:[],goal:4},
    din:{plans:{}},
    tasks:{list:JSON.parse(JSON.stringify(DTASKS)),comp:[]},
    shop:{items:[],trips:0},
    log:[],
  };
  // migrate old data
  S.players.forEach(p=>{if(!p.badges)p.badges=[];});
  if(!S.budget.recurring)S.budget.recurring=[];
  if(!S.shop.trips)S.shop.trips=0;
  if(!S.cal.gcEvs)S.cal.gcEvs=[];
}
function sv(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function ga(){return S.players.find(p=>p.id===S.aId)||S.players[0]}
function glvl(l){return LVLS[Math.min(l-1,LVLS.length-1)]}

// ═══════════════════════════════════════════════════════
// GAMIFICATION
// ═══════════════════════════════════════════════════════
function award(pid,pts,rsn,icon='💰'){
  const p=S.players.find(x=>x.id===pid);if(!p)return;
  p.pts+=pts;p.xp+=Math.max(0,pts);
  const nl=Math.floor(p.xp/200)+1;
  if(nl>p.lvl){p.lvl=nl;showLvlUp(p);}
  S.log.unshift({pid,pts,rsn,icon,ts:Date.now()});
  if(S.log.length>150)S.log.pop();
  checkBadges(p);
  sv();
  toast(`${pts>0?'+':''}${pts} — ${rsn}`,pts>0?'ok':'err');
}

function applyRecurring(){
  const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  (S.budget.recurring||[]).forEach(r=>{
    const exists=S.budget.entries.some(e=>e.rid===r.id&&new Date(e.date).getMonth()===m&&new Date(e.date).getFullYear()===y);
    if(!exists){
      S.budget.entries.push({id:Date.now()+Math.random(),day:r.day||1,type:'exp',mc:r.mc,sc:r.sc,amt:r.amt,py:r.py||'הוראת קבע',nt:'(קבוע)',date:new Date(y,m,r.day||1).toISOString(),by:1,rid:r.id});
      // also create calendar reminder
      const evDate=new Date(y,m,r.day||1);
      if(evDate>=now){
        S.cal.events.push({id:'rec_'+r.id+'_'+m+'_'+y,title:`💳 ${r.sc||r.mc}`,date:evDate.toISOString(),cat:'חשבון/תשלום',nt:`תשלום קבוע ₪${r.amt}`,auto:true});
      }
    }
  });
  sv();
}

let tTmr;
function toast(msg,type='ok'){
  const t=document.getElementById('toast');

  t.style.border=`1px solid ${type==='err'?'#f44336':'#00C896'}`;

}

function doConfetti(){
  const c=document.getElementById('tc'),cols=['#FFD700','#FF6B6B','#4ECDC4','#96CEB4','#FF69B4','#fff'];
  for(let i=0;i<30;i++){
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'};left:${Math.random()*100}%;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};animation:fall ${1.5+Math.random()*1}s ${Math.random()*0.5}s ease-in forwards`;

  }
}

function smartCategory(name){
  const n=name.toLowerCase();
  for(const[cat,kws]of Object.entries(SMART_CATS)){
    if(kws.some(k=>n.includes(k)))return cat;
  }
  return 'כללי';
}

      pieHtml=`<div class="card" style="margin-bottom:9px"><div class="st">📊 התפלגות הוצאות</div><div style="display:flex;gap:12px;align-items:center"><svg width="160" height="160" viewBox="0 0 160 160">${paths}<circle cx="${cx}" cy="${cy}" r="28" fill="var(--bg2)"/><text x="${cx}" y="${cy+4}" text-anchor="middle" fill="var(--gold)" font-size="10" font-weight="bold">₪${totalExp.toLocaleString()}</text></svg><div style="flex:1">${legend}</div></div></div>`;
    }
    tab=pieHtml+['exp','inc'].map(tp=>{
      const cats=tp==='exp'?CEX:CIN,lbl=tp==='exp'?'הוצאות':'הכנסות';
      return`<div class="card" style="margin-bottom:9px"><div class="st">${lbl}</div>${Object.entries(cats).map(([cat,subs])=>{
        const ac=ct(mE,cat,tp),tgt=S.budget.targets[cat]||0,pct=tgt>0?Math.min(100,Math.round(ac/tgt*100)):0,bc=pct>100?'var(--red)':pct>80?'#FF9800':'var(--green)';
        return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:2px" onclick="bCol['${cat}']=!bCol['${cat}'];render()">
          <span style="font-size:10px;font-weight:700;color:var(--gold)">${bCol[cat]?'▶':'▼'} ${cat}</span>
          <div style="display:flex;align-items:center;gap:4px"><span style="font-size:9px;color:${pct>100?'var(--red)':'var(--green)'}">₪${ac.toLocaleString()} /</span>
          <input type="number" value="${tgt||''}" placeholder="תקציב" onchange="S.budget.targets['${cat}']=parseFloat(this.value)||0;sv()" onclick="event.stopPropagation()" style="width:60px;padding:2px 4px;font-size:9px"></div>
        </div>
        ${tgt>0?`<div class="pb" style="margin-bottom:2px"><div class="pf" style="width:${pct}%;background:${bc}"></div></div>`:''}
        ${!bCol[cat]?subs.map(s=>{const sa2=mE.filter(e=>e.sc===s&&e.type===tp).reduce((a,e)=>a+e.amt,0);return sa2>0?`<div style="display:flex;justify-content:space-between;padding:2px 7px;font-size:9px;color:#aaa"><span>${s}</span><span>₪${sa2.toLocaleString()}</span></div>`:''}).join(''):''}`;
      }).join('')}</div>`;
    }).join('');

  } else if(bTab==='compare'){
    // Bar chart SVG
    const cats=Object.keys(CEX).slice(0,8);
    const maxV=Math.max(...cats.map(c=>Math.max(ct(mE,c,'exp'),ct(pE,c,'exp'))),1);
    const BAR_H=80,BAR_W=16,GAP=24,svgW=cats.length*(BAR_W*2+GAP)+GAP;
    const bars=cats.map((cat,i)=>{const cv=ct(mE,cat,'exp'),pv=ct(pE,cat,'exp');const x=GAP+i*(BAR_W*2+GAP);const ch=Math.round((cv/maxV)*BAR_H),ph=Math.round((pv/maxV)*BAR_H);return`<rect x="${x}" y="${BAR_H-ch}" width="${BAR_W}" height="${ch}" fill="var(--gold)" rx="2"/><rect x="${x+BAR_W+1}" y="${BAR_H-ph}" width="${BAR_W}" height="${ph}" fill="#444" rx="2"/><text x="${x+BAR_W}" y="${BAR_H+12}" text-anchor="middle" fill="var(--muted)" font-size="7">${cat.split(' ')[0]}</text>`}).join('');
    tab=`<div class="card" style="margin-bottom:9px"><div class="st">📊 השוואה חזותית</div>
      <div style="display:flex;gap:10px;font-size:9px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;background:var(--gold);border-radius:2px"></div>${MNS[bM]}</div><div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;background:#444;border-radius:2px"></div>${MNS[pm]}</div></div>
      <div class="chart-wrap"><svg width="${svgW}" height="${BAR_H+20}" viewBox="0 0 ${svgW} ${BAR_H+20}">${bars}</svg></div>
    </div>
    <div class="card">${Object.keys(CEX).map(cat=>{const cv=ct(mE,cat,'exp'),pv=ct(pE,cat,'exp');if(!cv&&!pv)return'';const diff=cv-pv,mx=Math.max(cv,pv,1);return`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span style="color:#ccc">${cat}</span><span style="color:${diff>0?'var(--red)':'var(--green)'};font-weight:600">${diff>0?'▲':'▼'} ₪${Math.abs(diff).toLocaleString()}</span></div><div style="display:flex;gap:2px;margin-bottom:1px"><div style="flex:1;background:var(--bg);border-radius:2px;height:5px"><div style="width:${cv/mx*100}%;height:100%;background:var(--gold);border-radius:2px"></div></div><span style="font-size:8px;color:var(--muted);min-width:45px;text-align:left">₪${cv.toLocaleString()}</span></div><div style="display:flex;gap:2px"><div style="flex:1;background:var(--bg);border-radius:2px;height:5px"><div style="width:${pv/mx*100}%;height:100%;background:#444;border-radius:2px"></div></div><span style="font-size:8px;color:#555;min-width:45px;text-align:left">₪${pv.toLocaleString()}</span></div></div>`;}).join('')}</div>`;

  } else if(bTab==='annual'){
    const allCats=Object.entries(CEX);
    const yr=bY;
    const mTotals=Array.from({length:12},(_,mi)=>{
      const mEi=S.budget.entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===mi&&d.getFullYear()===yr});
      return mEi;
    });
    const rows=allCats.map(([cat,subs])=>{
      const vals=Array.from({length:12},(_,mi)=>mTotals[mi].filter(e=>e.mc===cat&&e.type==='exp').reduce((a,e)=>a+e.amt,0));
      const avg=vals.reduce((a,v)=>a+v,0)/12;
      return`<tr><td style="font-size:9px;font-weight:600;color:var(--gold);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</td>${vals.map(v=>`<td style="font-size:8px;color:${v>0?'var(--text)':'var(--muted)'}">${v>0?'₪'+v.toLocaleString():'–'}</td>`).join('')}<td style="font-size:8px;color:var(--gold);font-weight:600">${avg>0?'₪'+Math.round(avg).toLocaleString():'–'}</td></tr>`;
    }).join('');
    tab=`<div class="card"><div class="row" style="margin-bottom:10px"><div class="st" style="margin:0">📆 סיכום שנתי ${yr}</div><div style="display:flex;gap:5px"><button class="btn-ghost btn-sm" onclick="bY--;render()">→</button><button class="btn-ghost btn-sm" onclick="bY++;render()">←</button></div></div>
      <div style="overflow-x:auto;max-height:400px;overflow-y:auto">
        <table class="ann-table"><thead><tr><th>קטגוריה</th>${MNS.map(m=>`<th>${m.slice(0,3)}</th>`).join('')}<th>ממוצע</th></tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>`;

  } else if(bTab==='export'){
    const mEall=S.budget.entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===bM&&d.getFullYear()===bY});
    const csv=['יום,סוג,קטגוריה,תת-קטגוריה,סכום,תשלום,הערה',...mEall.map(e=>`${e.day},${e.type==='inc'?'הכנסה':'הוצאה'},${e.mc},${e.sc||''},${e.amt},${e.py},${e.nt||''}`)].join('\n');
    tab=`<div class="card"><div class="st">📤 ייצוא נתונים</div>
      <p style="font-size:11px;color:var(--muted);margin-bottom:12px">ייצא את נתוני ${MNS[bM]} ${bY} לקובץ CSV שניתן לפתוח ב-Excel</p>
      <button class="btn-gold" style="width:100%;margin-bottom:10px" onclick="exportCSV()">⬇️ הורד CSV — ${MNS[bM]}</button>
      <button class="btn-ghost" style="width:100%" onclick="openQR()">📲 שתף QR</button>
    </div>`;
  }

  c.innerHTML=`<div class="fade-in"><div class="row" style="margin-bottom:10px"><h2 class="gold" style="font-weight:700">💰 תקציב</h2><div style="display:flex;align-items:center;gap:5px"><button class="btn-ghost btn-sm" onclick="shBM(-1)">→</button><span style="font-size:10px;color:var(--gold)">${MNS[bM]} ${bY}</span><button class="btn-ghost btn-sm" onclick="shBM(1)">←</button></div></div>
  <div class="g3" style="margin-bottom:10px"><div class="card" style="text-align:center;padding:9px;border-color:var(--green)"><div style="color:var(--green);font-weight:700;font-size:13px">₪${tI.toLocaleString()}</div><div style="font-size:8px;color:var(--muted)">הכנסות</div></div><div class="card" style="text-align:center;padding:9px;border-color:var(--red)"><div style="color:var(--red);font-weight:700;font-size:13px">₪${tX.toLocaleString()}</div><div style="font-size:8px;color:var(--muted)">הוצאות</div></div><div class="card" style="text-align:center;padding:9px;border-color:${tI-tX>=0?'var(--green)':'var(--red)'}"><div style="color:${tI-tX>=0?'var(--green)':'var(--red)'};font-weight:700;font-size:13px">₪${(tI-tX).toLocaleString()}</div><div style="font-size:8px;color:var(--muted)">הפרש</div></div></div>
  <div style="display:flex;gap:5px;margin-bottom:10px;overflow-x:auto">${Btn('רישום','log')}${Btn('תקציב','budget')}${Btn('השוואה','compare')}${Btn('שנתי','annual')}${Btn('ייצוא','export')}</div>
  ${tab}</div>`;
  if(bTab==='log')setTimeout(updMC,50);
}

function shBM(d){bM+=d;if(bM>11){bM=0;bY++}if(bM<0){bM=11;bY--}render()}
function updMC(){const tp=document.getElementById('bt')?.value,cats=tp==='exp'?CEX:CIN,s=document.getElementById('bmc');if(!s)return;s.innerHTML='<option value="">בחר קטגוריה...</option>'+Object.keys(cats).map(c=>`<option value="${c}">${c}</option>`).join('');updSC()}
function updSC(){const tp=document.getElementById('bt')?.value,mc=document.getElementById('bmc')?.value,cats=tp==='exp'?CEX:CIN,s=document.getElementById('bsc');if(!s)return;s.innerHTML='<option value="">בחר תת-קטגוריה...</option>'+(mc&&cats[mc]?cats[mc].map(x=>`<option>${x}</option>`).join(''):'')}
function logBud(){
  const tp=document.getElementById('bt').value,mc=document.getElementById('bmc').value,sc=document.getElementById('bsc').value,amt=parseFloat(document.getElementById('bam').value),py=document.getElementById('bpy').value,nt=document.getElementById('bnt').value,day=parseInt(document.getElementById('bd').value),isRec=document.getElementById('brec').checked;
  if(!mc||!amt){toast('נא למלא קטגוריה וסכום','err');return}
  const id=Date.now();
  const en={id,day,type:tp,mc,sc,amt,py,nt,date:new Date(bY,bM,day).toISOString(),by:ga().id};
  if(isRec){S.budget.recurring.push({id:'r'+id,day,mc,sc,amt,py});toast('🔁 נוסף כהוצאה קבועה!')}
  S.budget.entries.unshift(en);
  const mE=S.budget.entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===bM&&d.getFullYear()===bY});
  const tgt=S.budget.targets[mc]||0,used=mE.filter(e=>e.mc===mc&&e.type==='exp').reduce((a,e)=>a+e.amt,0);
  if(tp==='exp'&&tgt>0&&used<=tgt){en.saved=true;award(ga().id,20,'חסכת ב'+mc,'💰')}
  else if(tp==='exp'&&tgt>0&&used>tgt)award(ga().id,-15,'חריגה ב'+mc,'⚠️');
  else{sv();toast('✅ נרשם')}
  checkAllBadges();render();
}

function exportCSV(){
  const mEall=S.budget.entries.filter(e=>{const d=new Date(e.date);return d.getMonth()===bM&&d.getFullYear()===bY});
  const csv=['יום,סוג,קטגוריה,תת-קטגוריה,סכום,תשלום,הערה',...mEall.map(e=>`${e.day},${e.type==='inc'?'הכנסה':'הוצאה'},${e.mc},${e.sc||''},${e.amt},${e.py},${e.nt||''}`)].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`budget_${MNS[bM]}_${bY}.csv`;a.click();
}

// CALENDAR

function pCal(c){
  const now=new Date();
  const all=[...S.cal.events,...(S.cal.gcEvs||[])].filter(e=>new Date(e.date)>=now).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const cc={'חשבון/תשלום':'var(--red)','יום הולדת':'var(--pink)','תור':'var(--blue)','יום נישואין':'var(--gold)','בית ספר':'var(--green)','כללי':'var(--muted)'};
  c.innerHTML=`<div class="fade-in"><div class="row" style="margin-bottom:10px"><h2 class="gold" style="font-weight:700">📅 יומן</h2><button class="btn-gold btn-sm" onclick="togEF()">+ אירוע</button></div>
  <div class="card" style="margin-bottom:9px">
    <div style="font-size:11px;font-weight:600;color:var(--pink);margin-bottom:6px">💍 יום נישואין</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="date" id="ann-in" value="${S.cal.anniversary||''}" style="flex:1">
      <button class="btn-gold btn-sm" onclick="saveAnn()">שמור</button>
    </div>
  </div>
  <div class="card" style="margin-bottom:9px;border-color:${S.cal.gcTok?'var(--green)':'var(--border)'}">
    <div class="row"><div><div style="font-size:12px;font-weight:600;margin-bottom:2px">📆 Google Calendar</div><div style="font-size:9px;color:${S.cal.gcTok?'var(--green)':'var(--muted)'}">${S.cal.gcTok?`✅ מחובר — ${S.cal.gcEvs?.length||0} אירועים`:'לא מחובר'}</div></div>
    <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">${!S.cal.gcTok?`<button class="btn-gold btn-sm" onclick="conGC()">🔗 חבר</button>`:`<button class="btn-gold btn-sm" onclick="refGC()">🔄 רענן</button><button class="btn-ghost btn-sm" onclick="S.cal.gcTok=null;S.cal.gcEvs=[];sv();render()">נתק</button>`}</div></div>
    ${!S.cal.gcTok?`<details style="margin-top:9px"><summary style="font-size:10px;color:var(--gold);cursor:pointer">הוראות חיבור ▼</summary><div style="font-size:10px;color:var(--muted);line-height:1.7;margin-top:6px;padding:7px;background:var(--bg);border-radius:7px">1. <b style="color:var(--green)">console.cloud.google.com</b><br>2. פרויקט → APIs &amp; Services → Credentials<br>3. OAuth 2.0 Client ID (Web app)<br>4. הפעל Google Calendar API<br>5. הוסף כתובת דף זה ל-Authorized Origins<br>6. עדכן <b style="color:var(--gold)">GCAL_CID</b> בקוד</div></details>`:''}
  </div>
  <div id="evf" style="display:none"><div class="card gold-b" style="margin-bottom:9px"><div class="st">אירוע חדש</div>
    <input id="et" placeholder="כותרת" style="margin-bottom:7px">
    <div class="g2" style="margin-bottom:7px"><div><div style="font-size:9px;color:var(--muted);margin-bottom:2px">תאריך</div><input type="date" id="ed"></div><div><div style="font-size:9px;color:var(--muted);margin-bottom:2px">שעה</div><input type="time" id="eh"></div></div>
    <select id="ec" style="margin-bottom:7px"><option>כללי</option><option>חשבון/תשלום</option><option>יום הולדת</option><option>תור</option><option>יום נישואין</option><option>בית ספר</option></select>
    <input id="en2" placeholder="הערה" style="margin-bottom:9px">
    <div style="display:flex;gap:7px"><button class="btn-gold" onclick="addEv()">שמור</button><button class="btn-ghost" onclick="togEF()">ביטול</button></div>
  </div></div>
  <div class="card"><div class="st">אירועים קרובים (${all.length})</div>
    ${all.length===0?'<p class="muted" style="text-align:center;padding:14px;font-size:12px">אין אירועים</p>':''}
    ${all.map(e=>{const dl=Math.ceil((new Date(e.date)-now)/864e5),col=cc[e.cat||e.category]||'var(--muted)';return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:7px"><div style="width:6px;height:6px;border-radius:50%;background:${col};flex-shrink:0"></div><div><div style="font-size:11px;font-weight:500">${e.title}${e.gcal?'<span class="tag" style="background:#1a3a1a;color:#4CAF50;margin-right:3px">G</span>':''}${e.auto?'<span class="tag" style="background:#1a2a3a;color:var(--blue);margin-right:3px">🔁</span>':''}</div><div style="font-size:9px;color:var(--muted)">${new Date(e.date).toLocaleDateString('he-IL')}${e.nt||e.note?' • '+(e.nt||e.note):''}</div></div></div><div style="display:flex;align-items:center;gap:5px"><span style="background:${dl<=3?'#3a1a1a':'#1a2a1a'};color:${dl<=3?'var(--red)':'var(--green)'};border-radius:5px;padding:2px 6px;font-size:9px;font-weight:600">${dl===0?'היום!':dl+'d'}</span>${!e.gcal&&!e.auto?`<button onclick="S.cal.events=S.cal.events.filter(x=>x.id!=='${e.id}');sv();render()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px">🗑</button>`:''}</div></div>`}).join('')}
  </div></div>`;
}
function saveAnn(){const v=document.getElementById('ann-in').value;S.cal.anniversary=v||null;sv();toast('💍 יום נישואין נשמר!');render()}
function togEF(){const f=document.getElementById('evf');if(f)f.style.display=f.style.display==='none'?'block':'none'}
function addEv(){const t=document.getElementById('et').value,d=document.getElementById('ed').value,h=document.getElementById('eh').value||'09:00',cat=document.getElementById('ec').value,nt=document.getElementById('en2').value;if(!t||!d){toast('נא למלא כותרת ותאריך','err');return}S.cal.events.push({id:'ev'+Date.now(),title:t,date:new Date(`${d}T${h}`).toISOString(),cat,nt,by:ga().id});sv();toast('📅 נוסף!');render()}
const GCAL_CID='YOUR_GOOGLE_CLIENT_ID';
function conGC(){const p=new URLSearchParams({client_id:GCAL_CID,redirect_uri:location.origin+location.pathname,response_type:'token',scope:'https://www.googleapis.com/auth/calendar.readonly',state:'gcal'});window.open('https://accounts.google.com/o/oauth2/v2/auth?'+p,'gcal','width=520,height=620')}
async function refGC(){if(!S.cal.gcTok){toast('לא מחובר','err');return}try{const tMin=new Date().toISOString(),tMax=new Date(Date.now()+60*864e5).toISOString();const res=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(tMin)}&timeMax=${encodeURIComponent(tMax)}&singleEvents=true&orderBy=startTime&maxResults=50`,{headers:{Authorization:'Bearer '+S.cal.gcTok}});if(!res.ok)throw new Error('auth');const data=await res.json();S.cal.gcEvs=(data.items||[]).map(e=>({id:'gc'+e.id,title:e.summary||'אירוע',date:e.start?.dateTime||e.start?.date+'T09:00:00',cat:'כללי',note:e.description||'',gcal:true}));sv();toast(`📅 ${S.cal.gcEvs.length} אירועים`);render()}catch(err){if(err.message==='auth'){S.cal.gcTok=null;S.cal.gcEvs=[];sv();toast('פג תוקף — התחבר מחדש','err')}else toast('שגיאה','err');render()}}

function pRom(c){
  const now=new Date(),md=S.rom.dates.filter(d=>{const dt=new Date(d.date);return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear()});

function addShp(){
  const n=document.getElementById('shn').value.trim();if(!n)return;
  const autoCat=smartCategory(n);
  const selCat=document.getElementById('shc').value;
  const cat=selCat!=='כללי'?selCat:autoCat;
  const price=parseFloat(document.getElementById('shp').value)||0;
  S.shop.items.unshift({id:Date.now(),nm:n,cat,rec:document.getElementById('shr').checked,bought:false,by:ga().id,price});
  document.getElementById('shn').value='';
  if(autoCat!=='כללי'&&selCat==='כללי')toast(`📦 קטגוריה זוהתה: ${autoCat}`);
  sv();render();
}
function togShp(id){const i=S.shop.items.find(x=>x.id===id);if(!i)return;i.bought=!i.bought;i.boughtBy=ga().id;sv();render()}
function doneShp(){
  if(!S.shop.items.filter(i=>!i.rec).every(i=>i.bought)){toast('לא כל הפריטים סומנו!','err');return}
  // Add shopping total to budget as expense
  const total=S.shop.items.reduce((a,i)=>a+(i.price||0),0);
  if(total>0){
    const now=new Date();
    S.budget.entries.unshift({id:Date.now(),day:now.getDate(),type:'exp',mc:'מזון ופארמה',sc:'קניות מכולת',amt:total,py:'אשראי',nt:'קניות - מהרשימה',date:now.toISOString(),by:ga().id});
    toast(`🛒 ₪${total.toFixed(0)} נוסף לתקציב`);
  }
  S.shop.trips=(S.shop.trips||0)+1;
  award(ga().id,15,'קניות הושלמו! 🛒','🛒');
  S.shop.items=S.shop.items.filter(i=>i.rec).map(i=>({...i,bought:false}));
  checkAllBadges();sv();render();
}

      ${BADGES.map(b=>{const earned=p.badges.includes(b.id);return`<div class="badge-item ${earned?'earned':'locked'}"><div style="font-size:24px;margin-bottom:4px">${b.icon}</div><div style="font-size:9px;font-weight:600;color:${earned?'var(--gold)':'var(--muted)'}">${b.name}</div><div style="font-size:8px;color:var(--muted)">${b.desc}</div></div>`}).join('')}
    </div>
  </div>

  <div class="card" style="margin-bottom:10px">
    <div class="st">📜 היסטוריית נקודות</div>
    ${recentLog.length===0?'<p class="muted" style="text-align:center;padding:10px;font-size:12px">אין פעילות עדיין</p>':''}
    ${recentLog.map(l=>`<div class="feed-item"><span style="font-size:14px">${l.icon||'💰'}</span><span style="flex:1">${l.rsn}</span><span style="color:${l.pts>0?'var(--green)':'var(--red)'};font-weight:700;font-size:12px">${l.pts>0?'+':''}${l.pts}</span><span style="font-size:8px;color:var(--muted);margin-right:6px">${new Date(l.ts).toLocaleDateString('he-IL')}</span></div>`).join('')}
  </div>

  <div class="card" style="margin-bottom:10px">
    <div class="st">⚙️ הגדרות</div>
    <button class="btn-ghost" style="width:100%;margin-bottom:8px" onclick="openQR()">📲 שתף / ייבא נתונים (QR)</button>
    <button class="btn-ghost" style="width:100%;margin-bottom:8px" onclick="exportAllJSON()">💾 גבה נתונים (JSON)</button>
    <label style="display:block;margin-bottom:8px"><input type="file" accept=".json" onchange="importJSON(this)" style="font-size:11px"> 📂 שחזר מגיבוי</label>
    <button class="btn-red" style="width:100%" onclick="if(confirm('למחוק הכל?')){localStorage.removeItem(KEY);location.reload()}">🗑 איפוס מלא</button>
  </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// DATA SHARING / QR / EXPORT
// ═══════════════════════════════════════════════════════
function exportAllJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='house_backup_'+Date.now()+'.json';a.click();
  toast('💾 גיבוי הורד!');
}

function importJSON(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{S=JSON.parse(e.target.result);sv();upTB();render();toast('✅ נתונים שוחזרו!');}catch{toast('שגיאה בקובץ','err')}};
  r.readAsText(file);
}

function openQR(){
  // Simple QR using Google Charts API (free, no key needed)
  const data=btoa(unescape(encodeURIComponent(JSON.stringify(S)))).slice(0,1000); // truncated for QR size
  const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent('HAW:'+data)}`;
  document.getElementById('qr-canvas').innerHTML=`<img src="${qrUrl}" style="border-radius:8px;border:2px solid var(--gold)">`;
  document.getElementById('qrm').style.display='flex';
}

function importFromClipboard(){
  navigator.clipboard.readText().then(txt=>{
    try{const d=JSON.parse(decodeURIComponent(escape(atob(txt.replace('HAW:','')))));S=d;sv();upTB();render();toast('✅ נתונים יובאו!');document.getElementById('qrm').style.display='none';}catch{toast('שגיאה בנתונים','err')}
  }).catch(()=>toast('לא ניתן לגשת ללוח','err'));
}

// ═══════════════════════════════════════════════════════
// PWA
// ═══════════════════════════════════════════════════════
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstall=e;render()});
function installPWA(){if(deferredInstall){deferredInstall.prompt();deferredInstall.userChoice.then(r=>{if(r.outcome==='accepted'){deferredInstall=null;toast('✅ אפליקציה הותקנה!')}})}}

// ═══════════════════════════════════════════════════════
// OAUTH REDIRECT
// ═══════════════════════════════════════════════════════
function chkOAuth(){
  const h=window.location.hash;
  if(h.includes('access_token')&&h.includes('gcal')){
    const p=new URLSearchParams(h.replace('#','?')),tok=p.get('access_token');
    if(tok){S.cal.gcTok=tok;sv();window.location.hash='';toast('✅ Google Calendar מחובר!');pg='calendar';render();setTimeout(refGC,500)}
  }
}

ld();
applyRecurring();
upTB();
renderNav();
render();
chkOAuth();
checkAllBadges();
